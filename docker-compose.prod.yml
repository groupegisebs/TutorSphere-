# TutorSphere — surcharge production (serveur Linux, réseau host)
#
# PostgreSQL : service systemd existant sur localhost:5432 (serveur partagé).
# Reverse proxy : nginx / Nginx Proxy Manager → 127.0.0.1:55099 (API) et :55010 (Web)
#
# Usage sur le serveur :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  api:
    network_mode: host
    ports: !reset []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:${API_PORT:-55099}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_PORT:-55099}/health || exit 1"]

  web:
    network_mode: host
    ports: !reset []
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:${WEB_PORT:-55010}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${WEB_PORT:-55010}/health || exit 1"]
    depends_on:
      api:
        condition: service_healthy
