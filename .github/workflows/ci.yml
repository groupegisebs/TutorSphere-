name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  DOTNET_VERSION: "10.0.x"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TutorSphere.slnx

      - name: Build
        run: dotnet build TutorSphere.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test TutorSphere.slnx --no-build --configuration Release --verbosity normal

  docker-build:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build API image
        run: docker build -f src/TutorSphere.Api/Dockerfile -t tutorsphere-api:ci .

      - name: Build Web image
        run: docker build -f src/TutorSphere.Web/Dockerfile -t tutorsphere-web:ci .
