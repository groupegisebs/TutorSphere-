name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-tutorsphere-ubuntu1
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  DEFAULT_SSH_HOST: "51.79.53.197"
  DEFAULT_SSH_USER: "ubuntu"
  DEFAULT_SSH_PORT: "22"
  DEFAULT_APP_ROOT: "/opt/apps/tutorsphere"
  DEFAULT_API_PORT: "55099"
  DEFAULT_WEB_PORT: "55010"
  DEFAULT_API_BASE_URL: "https://api.tutorsphere.gisebs.com"
  DEFAULT_APP_NAME: "TutorSphere"
  DEFAULT_PAYGATEWAY_APP_CODE: "TUTORSPHERE"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore TutorSphere.slnx

      - name: Build Release
        run: dotnet build TutorSphere.slnx -c Release --no-restore

      - name: Prepare deploy scripts
        run: chmod +x deploy/deploy-gha.sh deploy/gha-env.sh deploy/database.defaults.sh deploy/build-app-env.sh

      - name: Diagnose secrets (noms acceptés)
        run: |
          echo "Dépôt : ${{ github.repository }}"
          echo ""
          echo "Secrets SSH (un seul suffit) :"
          echo "  SSH_PRIVATE_KEY_UBUNTU1         → ${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 != '' && 'OK' || 'manquant' }}"
          echo "  TUTORSPHERE_SSH_PRIVATE_KEY     → ${{ secrets.TUTORSPHERE_SSH_PRIVATE_KEY != '' && 'OK' || 'manquant' }}"
          echo "  SSH_PRIVATE_KEY (legacy ci.yml) → ${{ secrets.SSH_PRIVATE_KEY != '' && 'OK' || 'manquant' }}"
          echo ""
          echo "Connection string (un seul suffit) :"
          echo "  TUTORSPHERE_CONNECTION_STRING   → ${{ secrets.TUTORSPHERE_CONNECTION_STRING != '' && 'OK' || 'manquant' }}"
          echo "  CONNECTIONSTRINGS__DEFAULTCONNECTION (legacy) → ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION != '' && 'OK' || 'manquant' }}"
          echo ""
          echo "JWT (obligatoire) :"
          echo "  TUTORSPHERE_JWT_KEY             → ${{ secrets.TUTORSPHERE_JWT_KEY != '' && 'OK' || 'manquant' }}"
          echo "  JWT__KEY (legacy ci.yml)        → ${{ secrets.JWT__KEY != '' && 'OK' || 'manquant' }}"
          echo ""
          echo "PayGateway (obligatoires pour les paiements) :"
          echo "  TUTORSPHERE_PAYGATEWAY_BASE_URL → ${{ secrets.TUTORSPHERE_PAYGATEWAY_BASE_URL != '' && 'OK' || 'manquant' }}"
          echo "  TUTORSPHERE_PAYGATEWAY_API_KEY  → ${{ secrets.TUTORSPHERE_PAYGATEWAY_API_KEY != '' && 'OK' || 'manquant' }}"
          echo "  TUTORSPHERE_PAYGATEWAY_USE_SANDBOX (var) → ${{ vars.TUTORSPHERE_PAYGATEWAY_USE_SANDBOX != '' && vars.TUTORSPHERE_PAYGATEWAY_USE_SANDBOX || 'false (défaut Live)' }}"
          echo ""
          echo "Guide : https://github.com/${{ github.repository }}/blob/main/deploy/GITHUB-SECRETS.md"

      - name: Load configuration
        env:
          KEY_UBUNTU1: ${{ secrets.SSH_PRIVATE_KEY_UBUNTU1 }}
          KEY_TUTOR: ${{ secrets.TUTORSPHERE_SSH_PRIVATE_KEY }}
          KEY_LEGACY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST_VAR: ${{ vars.SSH_HOST_UBUNTU1 }}
          HOST_SECRET: ${{ secrets.SSH_HOST_UBUNTU1 }}
          USER_VAR: ${{ vars.SSH_USER_UBUNTU1 }}
          USER_SECRET: ${{ secrets.SSH_USER_UBUNTU1 }}
          PORT_VAR: ${{ vars.SSH_PORT_UBUNTU1 }}
          PORT_SECRET: ${{ secrets.SSH_PORT_UBUNTU1 }}
          CONN_TUTOR: ${{ secrets.TUTORSPHERE_CONNECTION_STRING }}
          CONN_LEGACY: ${{ secrets.CONNECTIONSTRINGS__DEFAULTCONNECTION }}
          APP_ROOT_VAR: ${{ vars.TUTORSPHERE_APP_ROOT }}
          APP_ROOT_SECRET: ${{ secrets.TUTORSPHERE_APP_ROOT }}
          API_PORT_VAR: ${{ vars.TUTORSPHERE_API_PORT }}
          API_PORT_SECRET: ${{ secrets.TUTORSPHERE_API_PORT }}
          WEB_PORT_VAR: ${{ vars.TUTORSPHERE_WEB_PORT }}
          WEB_PORT_SECRET: ${{ secrets.TUTORSPHERE_WEB_PORT }}
          JWT_KEY: ${{ secrets.TUTORSPHERE_JWT_KEY }}
          JWT_KEY_LEGACY: ${{ secrets.JWT__KEY }}
          PG_BASE_URL: ${{ secrets.TUTORSPHERE_PAYGATEWAY_BASE_URL }}
          PG_API_KEY: ${{ secrets.TUTORSPHERE_PAYGATEWAY_API_KEY }}
          PG_APP_CODE_VAR: ${{ vars.TUTORSPHERE_PAYGATEWAY_APP_CODE }}
          PG_APP_CODE_SECRET: ${{ secrets.TUTORSPHERE_PAYGATEWAY_APP_CODE }}
          PG_USE_SANDBOX_VAR: ${{ vars.TUTORSPHERE_PAYGATEWAY_USE_SANDBOX }}
          EMAIL_API_KEY: ${{ secrets.TUTORSPHERE_EMAIL_API_KEY }}
          EMAIL_CLIENT_CODE_VAR: ${{ vars.TUTORSPHERE_EMAIL_CLIENT_CODE }}
          API_BASE_URL_VAR: ${{ vars.TUTORSPHERE_API_BASE_URL }}
          API_BASE_URL_SECRET: ${{ secrets.TUTORSPHERE_API_BASE_URL }}
          BOOTSTRAP_ADMIN_ENABLED_VAR: ${{ vars.TUTORSPHERE_BOOTSTRAP_ADMIN_ENABLED }}
          BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.TUTORSPHERE_BOOTSTRAP_ADMIN_EMAIL }}
          BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.TUTORSPHERE_BOOTSTRAP_ADMIN_PASSWORD }}
        run: |
          source deploy/gha-env.sh
          source deploy/database.defaults.sh

          pick_first() {
            for v in "$@"; do
              if [ -n "$v" ]; then
                printf '%s' "$v"
                return 0
              fi
            done
            return 1
          }

          normalize_bool() {
            case "$(printf '%s' "$1" | tr '[:upper:]' '[:lower:]')" in
              true|1|yes|on) printf 'true' ;;
              false|0|no|off|'') printf 'false' ;;
              *)
                echo "::error::TUTORSPHERE_PAYGATEWAY_USE_SANDBOX invalide : '$1' (attendu true ou false)"
                exit 1
                ;;
            esac
          }

          SSH_PRIVATE_KEY=$(pick_first "$KEY_TUTOR" "$KEY_UBUNTU1" "$KEY_LEGACY") || true
          SSH_HOST_RAW=$(pick_first "$HOST_VAR" "$HOST_SECRET" "$DEFAULT_SSH_HOST") || true
          SSH_USER_RAW=$(pick_first "$USER_VAR" "$USER_SECRET" "$DEFAULT_SSH_USER") || true
          SSH_PORT_RAW=$(pick_first "$PORT_VAR" "$PORT_SECRET" "$DEFAULT_SSH_PORT") || true
          CONNECTION_STRING_RAW=$(pick_first "$CONN_TUTOR" "$CONN_LEGACY") || true
          APP_ROOT_RAW=$(pick_first "$APP_ROOT_VAR" "$APP_ROOT_SECRET" "$DEFAULT_APP_ROOT") || true
          API_PORT_RAW=$(pick_first "$API_PORT_VAR" "$API_PORT_SECRET" "$DEFAULT_API_PORT") || true
          WEB_PORT_RAW=$(pick_first "$WEB_PORT_VAR" "$WEB_PORT_SECRET" "$DEFAULT_WEB_PORT") || true
          JWT_KEY_RAW=$(pick_first "$JWT_KEY" "$JWT_KEY_LEGACY") || true
          PAYGATEWAY_BASE_URL_RAW=$(pick_first "$PG_BASE_URL") || true
          PAYGATEWAY_API_KEY_RAW=$(pick_first "$PG_API_KEY") || true
          PAYGATEWAY_APP_CODE_RAW=$(pick_first "$PG_APP_CODE_VAR" "$PG_APP_CODE_SECRET" "$DEFAULT_PAYGATEWAY_APP_CODE") || true
          PAYGATEWAY_USE_SANDBOX_RAW=$(normalize_bool "${PG_USE_SANDBOX_VAR:-true}")
          EMAIL_API_KEY_RAW=$(pick_first "$EMAIL_API_KEY") || true
          EMAIL_CLIENT_CODE_RAW=$(pick_first "$EMAIL_CLIENT_CODE_VAR" "TUTORSPHERE") || true
          API_BASE_URL_RAW=$(pick_first "$API_BASE_URL_VAR" "$API_BASE_URL_SECRET") || true

          missing=0
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Clé SSH manquante."
            echo "→ SSH_PRIVATE_KEY_UBUNTU1 (org), TUTORSPHERE_SSH_PRIVATE_KEY ou SSH_PRIVATE_KEY (legacy ci.yml)"
            missing=1
          fi
          if [ -z "$CONNECTION_STRING_RAW" ]; then
            echo "::error::Connection string PostgreSQL manquante."
            echo "→ TUTORSPHERE_CONNECTION_STRING ou CONNECTIONSTRINGS__DEFAULTCONNECTION (legacy)"
            missing=1
          fi
          if [ -z "$JWT_KEY_RAW" ]; then
            echo "::error::Clé JWT manquante."
            echo "→ TUTORSPHERE_JWT_KEY ou JWT__KEY (legacy, min. 32 caractères)"
            missing=1
          fi
          if [ -z "$PAYGATEWAY_BASE_URL_RAW" ]; then
            echo "::error::PayGateway BaseUrl manquante."
            echo "→ TUTORSPHERE_PAYGATEWAY_BASE_URL (ex. https://gisebsapipaygateway.gisebs.com)"
            missing=1
          fi
          if [ -z "$PAYGATEWAY_API_KEY_RAW" ]; then
            echo "::error::PayGateway API Key manquante."
            echo "→ TUTORSPHERE_PAYGATEWAY_API_KEY (clé gbsk_… de l'app TUTORSPHERE dans PayGateway)"
            missing=1
          fi
          [ "$missing" -eq 0 ] || exit 1

          PG_URL_CHECK=$(printf '%s' "$PAYGATEWAY_BASE_URL_RAW" | tr '[:upper:]' '[:lower:]')
          if printf '%s' "$PG_URL_CHECK" | grep -qE 'giseboutique|agentiamarket'; then
            echo "::error::TUTORSPHERE_PAYGATEWAY_BASE_URL pointe vers la boutique, pas vers PayGateway."
            echo "→ Corrigez le secret : https://gisebsapipaygateway.gisebs.com"
            exit 1
          fi

          if printf '%s' "$CONNECTION_STRING_RAW" | grep -qi 'giseRoleBaseTemplaASPDotNet'; then
            echo "::warning::Secret TUTORSPHERE_CONNECTION_STRING utilise encore l'ancienne base partagée — remplacement par ${TUTORSPHERE_POSTGRES_DATABASE}"
          fi
          CONNECTION_STRING_RAW=$(normalize_tutorsphere_connection_string "$CONNECTION_STRING_RAW")

          SSH_HOST=$(gha_sanitize_host "$SSH_HOST_RAW")
          SSH_USER=$(gha_sanitize "$SSH_USER_RAW")
          SSH_PORT=$(gha_sanitize "$SSH_PORT_RAW")
          APP_ROOT=$(gha_sanitize "$APP_ROOT_RAW")
          API_PORT=$(gha_sanitize "$API_PORT_RAW")
          WEB_PORT=$(gha_sanitize "$WEB_PORT_RAW")

          gha_write_env SSH_PRIVATE_KEY "$SSH_PRIVATE_KEY"
          gha_write_env SSH_HOST "$SSH_HOST"
          gha_write_env SSH_USER "$SSH_USER"
          gha_write_env SSH_PORT "$SSH_PORT"
          gha_write_env APP_ROOT "$APP_ROOT"
          gha_write_env APP_NAME "$DEFAULT_APP_NAME"
          gha_write_env API_PORT "$API_PORT"
          gha_write_env WEB_PORT "$WEB_PORT"
          gha_write_env CONNECTION_STRING "$(gha_sanitize "$CONNECTION_STRING_RAW")"
          gha_write_env JWT_KEY "$(gha_sanitize "$JWT_KEY_RAW")"
          gha_write_env PAYGATEWAY_BASE_URL "$(gha_sanitize "$PAYGATEWAY_BASE_URL_RAW")"
          gha_write_env PAYGATEWAY_API_KEY "$(gha_sanitize "$PAYGATEWAY_API_KEY_RAW")"
          gha_write_env PAYGATEWAY_APP_CODE "$(gha_sanitize "$PAYGATEWAY_APP_CODE_RAW")"
          gha_write_env PAYGATEWAY_USE_SANDBOX "$PAYGATEWAY_USE_SANDBOX_RAW"
          [ -n "$EMAIL_API_KEY_RAW" ] && gha_write_env EMAIL_API_KEY "$(gha_sanitize "$EMAIL_API_KEY_RAW")" || true
          gha_write_env EMAIL_CLIENT_CODE "$(gha_sanitize "$EMAIL_CLIENT_CODE_RAW")"
          if [ -n "$API_BASE_URL_RAW" ]; then
            gha_write_env API_BASE_URL "$(gha_sanitize "$API_BASE_URL_RAW")"
          else
            gha_write_env API_BASE_URL "${DEFAULT_API_BASE_URL}"
          fi

          # SuperAdmin bootstrap — défauts prédéfinis ; secrets GitHub optionnels pour surcharge
          BOOTSTRAP_ENABLED_RAW=$(printf '%s' "${BOOTSTRAP_ADMIN_ENABLED_VAR:-true}" | tr '[:upper:]' '[:lower:]')
          case "$BOOTSTRAP_ENABLED_RAW" in true|1|yes|on) BOOTSTRAP_ENABLED_RAW=true ;; *) BOOTSTRAP_ENABLED_RAW=false ;; esac
          gha_write_env SEED_BOOTSTRAP_ADMIN_ENABLED "$BOOTSTRAP_ENABLED_RAW"
          gha_write_env SEED_BOOTSTRAP_ADMIN_EMAIL "$(gha_sanitize "${BOOTSTRAP_ADMIN_EMAIL:-tutorsphere@gisebs.com}")"
          gha_write_env SEED_BOOTSTRAP_ADMIN_PASSWORD "$(gha_sanitize "${BOOTSTRAP_ADMIN_PASSWORD:-Mcd!123456789}")"

          echo "OK → ${SSH_USER}@${SSH_HOST}:${SSH_PORT} app=${APP_ROOT} api=${API_PORT} web=${WEB_PORT} paygateway.sandbox=${PAYGATEWAY_USE_SANDBOX_RAW}"

      - name: Setup SSH key
        id: ssh
        run: |
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          ssh-keygen -y -f "$HOME/.ssh/deploy_key" > /dev/null 2>&1 || {
            echo "::error::Clé SSH invalide — vérifiez le format multiligne (BEGIN/END OPENSSH PRIVATE KEY)"
            exit 1
          }
          echo "SSH_KEY_PATH=$HOME/.ssh/deploy_key" >> "$GITHUB_ENV"

      - name: Add server to known_hosts
        run: ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Deploy
        env:
          SSH_KEY_PATH: ${{ env.SSH_KEY_PATH }}
          SSH_HOST: ${{ env.SSH_HOST }}
          SSH_USER: ${{ env.SSH_USER }}
          SSH_PORT: ${{ env.SSH_PORT }}
          APP_ROOT: ${{ env.APP_ROOT }}
          CONNECTION_STRING: ${{ env.CONNECTION_STRING }}
          JWT_KEY: ${{ env.JWT_KEY }}
          PAYGATEWAY_BASE_URL: ${{ env.PAYGATEWAY_BASE_URL }}
          PAYGATEWAY_API_KEY: ${{ env.PAYGATEWAY_API_KEY }}
          PAYGATEWAY_APP_CODE: ${{ env.PAYGATEWAY_APP_CODE }}
          PAYGATEWAY_USE_SANDBOX: ${{ env.PAYGATEWAY_USE_SANDBOX }}
          EMAIL_API_KEY: ${{ env.EMAIL_API_KEY }}
          EMAIL_CLIENT_CODE: ${{ env.EMAIL_CLIENT_CODE }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
          API_PORT: ${{ env.API_PORT }}
          WEB_PORT: ${{ env.WEB_PORT }}
          SEED_BOOTSTRAP_ADMIN_ENABLED: ${{ env.SEED_BOOTSTRAP_ADMIN_ENABLED }}
          SEED_BOOTSTRAP_ADMIN_EMAIL: ${{ env.SEED_BOOTSTRAP_ADMIN_EMAIL }}
          SEED_BOOTSTRAP_ADMIN_PASSWORD: ${{ env.SEED_BOOTSTRAP_ADMIN_PASSWORD }}
        run: bash deploy/deploy-gha.sh

      - name: Container status
        if: always() && steps.ssh.outcome == 'success'
        run: |
          ssh -i "$SSH_KEY_PATH" -p "$SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" bash -s <<REMOTE
          set -eu
          cd "${APP_ROOT}/app"
          if docker compose version >/dev/null 2>&1; then
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps || true
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml ps || true
          else
            echo "Docker Compose introuvable sur le serveur"
            ls -la . || true
          fi
          REMOTE
