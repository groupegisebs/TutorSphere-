<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <radialGradient id="bgCircle" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(88,49,224,0.14)"/>
    </filter>
    <filter id="deskShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(88,49,224,0.10)"/>
    </filter>
  </defs>

  <!-- background circle -->
  <circle cx="250" cy="230" r="195" fill="url(#bgCircle)"/>

  <!-- ── floor shadow ── -->
  <ellipse cx="250" cy="345" rx="170" ry="18" fill="rgba(100,60,220,0.08)"/>

  <!-- ── chair ── -->
  <!-- seat -->
  <ellipse cx="120" cy="295" rx="50" ry="14" fill="#7c3aed"/>
  <!-- back -->
  <rect x="84" y="205" width="72" height="88" rx="14" fill="#6d28d9"/>
  <!-- back highlight -->
  <rect x="92" y="213" width="56" height="72" rx="10" fill="#7c3aed" opacity="0.6"/>
  <!-- leg -->
  <rect x="110" y="306" width="20" height="38" rx="6" fill="#5b21b6"/>

  <!-- ── desk surface ── -->
  <rect x="85" y="258" width="340" height="18" rx="8" fill="#c4b5fd" filter="url(#deskShadow)"/>
  <rect x="85" y="258" width="340" height="13" rx="8" fill="#ddd6fe"/>
  <!-- desk legs -->
  <rect x="100" y="275" width="12" height="55" rx="5" fill="#a78bfa"/>
  <rect x="398" y="275" width="12" height="55" rx="5" fill="#a78bfa"/>

  <!-- ── plant ── -->
  <!-- pot -->
  <path d="M106 258 l8-26 h20 l8 26 Z" fill="#7c3aed" opacity="0.85"/>
  <rect x="103" y="258" width="36" height="6" rx="3" fill="#6d28d9"/>
  <!-- leaves -->
  <ellipse cx="124" cy="214" rx="22" ry="24" fill="#34d399" transform="rotate(-15,124,214)"/>
  <ellipse cx="138" cy="220" rx="18" ry="20" fill="#10b981" transform="rotate(20,138,220)"/>
  <ellipse cx="111" cy="222" rx="16" ry="18" fill="#059669" transform="rotate(-30,111,222)"/>
  <ellipse cx="124" cy="208" rx="12" ry="15" fill="#6ee7b7"/>

  <!-- ── books ── -->
  <!-- book 3 top – yellow -->
  <rect x="172" y="227" width="52" height="10" rx="3" fill="#fbbf24"/>
  <rect x="172" y="227" width="5" height="10" rx="2" fill="#f59e0b"/>
  <!-- book 2 mid – teal -->
  <rect x="170" y="237" width="56" height="11" rx="3" fill="#06b6d4"/>
  <rect x="170" y="237" width="5" height="11" rx="2" fill="#0284c7"/>
  <!-- book 1 bottom – violet -->
  <rect x="168" y="247" width="60" height="11" rx="3" fill="#7c3aed"/>
  <rect x="168" y="247" width="5" height="11" rx="2" fill="#5b21b6"/>

  <!-- ── laptop ── -->
  <!-- lid -->
  <rect x="208" y="188" width="148" height="94" rx="8" fill="#1e1b4b"/>
  <!-- screen bezel -->
  <rect x="214" y="193" width="136" height="84" rx="5" fill="#2d2a6e"/>
  <!-- screen -->
  <rect x="218" y="197" width="128" height="76" rx="3" fill="#f5f3ff"/>
  <!-- taskbar -->
  <rect x="218" y="264" width="128" height="9" rx="0" fill="#ede9fe"/>
  <!-- screen icon top-left -->
  <rect x="224" y="202" width="24" height="16" rx="3" fill="#ddd6fe"/>
  <rect x="226" y="204" width="20" height="12" rx="2" fill="#7c3aed" opacity="0.3"/>
  <!-- TutorSphere text on screen -->
  <text x="282" y="240" font-size="11" font-weight="800" fill="#5b21b6" text-anchor="middle" font-family="sans-serif">TutorSphere</text>
  <text x="282" y="253" font-size="7" fill="#7c3aed" text-anchor="middle" font-family="sans-serif">Votre école. Votre marque.</text>
  <!-- base hinge -->
  <rect x="204" y="280" width="156" height="7" rx="3" fill="#312e81"/>
  <!-- keyboard base -->
  <rect x="196" y="286" width="172" height="10" rx="5" fill="#1e1b4b"/>
  <!-- touchpad -->
  <rect x="258" y="289" width="48" height="5" rx="2" fill="#2d2a6e"/>

  <!-- ── lamp ── -->
  <!-- base -->
  <rect x="354" y="295" width="38" height="7" rx="4" fill="#5b21b6"/>
  <!-- stem -->
  <rect x="369" y="253" width="10" height="45" rx="4" fill="#7c3aed"/>
  <!-- arm -->
  <line x1="374" y1="253" x2="348" y2="195" stroke="#7c3aed" stroke-width="9" stroke-linecap="round"/>
  <!-- shade -->
  <ellipse cx="342" cy="191" rx="26" ry="16" fill="#a78bfa"/>
  <path d="M316 191 Q342 175 368 191" fill="#7c3aed" opacity="0.5"/>
  <!-- light glow -->
  <ellipse cx="342" cy="200" rx="18" ry="10" fill="#fde68a" opacity="0.35"/>

  <!-- ── floating card: revenue chart ── -->
  <g transform="translate(340,108)" filter="url(#cardShadow)">
    <rect width="108" height="72" rx="10" fill="white"/>
    <!-- bar chart -->
    <rect x="14" y="42" width="9" height="18" rx="2" fill="#7c3aed"/>
    <rect x="27" y="34" width="9" height="26" rx="2" fill="#a78bfa"/>
    <rect x="40" y="28" width="9" height="32" rx="2" fill="#7c3aed"/>
    <rect x="53" y="36" width="9" height="24" rx="2" fill="#a78bfa"/>
    <rect x="66" y="22" width="9" height="38" rx="2" fill="#7c3aed"/>
    <rect x="79" y="32" width="9" height="28" rx="2" fill="#a78bfa"/>
    <line x1="10" y1="60" x2="95" y2="60" stroke="#e5e7eb" stroke-width="1"/>
    <text x="10" y="16" font-size="8" font-weight="700" fill="#1e1b4b" font-family="sans-serif">Revenus</text>
    <text x="10" y="69" font-size="6.5" fill="#9ca3af" font-family="sans-serif">Ce mois</text>
  </g>

  <!-- ── floating card: users ── -->
  <g transform="translate(50,145)" filter="url(#cardShadow)">
    <rect width="88" height="66" rx="10" fill="white"/>
    <!-- avatar circle -->
    <circle cx="44" cy="28" r="16" fill="#ede9fe"/>
    <circle cx="44" cy="24" r="8" fill="#7c3aed"/>
    <path d="M28 50 Q44 38 60 50" fill="#ede9fe"/>
    <text x="44" y="61" font-size="7" fill="#9ca3af" text-anchor="middle" font-family="sans-serif">32 élèves actifs</text>
  </g>
</svg>
