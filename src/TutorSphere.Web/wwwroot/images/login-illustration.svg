<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" fill="none">
  <!-- Floor shadow -->
  <ellipse cx="210" cy="310" rx="160" ry="18" fill="rgba(88,49,224,0.10)"/>

  <!-- Desk surface -->
  <rect x="60" y="210" width="300" height="18" rx="4" fill="#c4b5fd"/>
  <rect x="80" y="226" width="12" height="60" rx="3" fill="#a78bfa"/>
  <rect x="328" y="226" width="12" height="60" rx="3" fill="#a78bfa"/>

  <!-- Laptop body (screen) -->
  <rect x="130" y="128" width="160" height="98" rx="8" fill="#1e1b4b"/>
  <rect x="136" y="134" width="148" height="86" rx="5" fill="#312e81"/>
  <!-- Screen content lines -->
  <rect x="148" y="148" width="80" height="6" rx="3" fill="rgba(255,255,255,0.7)"/>
  <rect x="148" y="160" width="60" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="148" y="170" width="70" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
  <rect x="148" y="182" width="96" height="20" rx="4" fill="#5831E0"/>
  <rect x="154" y="187" width="84" height="10" rx="2" fill="rgba(255,255,255,0.9)"/>
  <!-- Laptop hinge -->
  <rect x="120" y="224" width="180" height="8" rx="4" fill="#4F2BD0"/>
  <!-- Laptop trackpad -->
  <rect x="182" y="234" width="56" height="36" rx="4" fill="#13103a"/>

  <!-- TutorSphere logo on screen -->
  <circle cx="264" cy="158" r="14" fill="#5831E0"/>
  <polygon points="264,148 258,158 270,158" fill="white"/>
  <rect x="261" y="155" width="6" height="10" rx="1" fill="white"/>

  <!-- Books stack -->
  <rect x="50" y="178" width="68" height="14" rx="3" fill="#7C5CFF"/>
  <rect x="54" y="165" width="60" height="14" rx="3" fill="#a78bfa"/>
  <rect x="58" y="153" width="52" height="13" rx="3" fill="#c4b5fd"/>

  <!-- Desk lamp -->
  <rect x="318" y="130" width="6" height="84" rx="3" fill="#a78bfa"/>
  <line x1="321" y1="130" x2="295" y2="165" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
  <circle cx="289" cy="168" r="16" fill="#fef3c7" opacity="0.9"/>
  <circle cx="289" cy="168" r="10" fill="#fde68a"/>
  <!-- Lamp glow -->
  <circle cx="289" cy="168" r="24" fill="#fef9c3" opacity="0.3"/>

  <!-- Plant -->
  <rect x="62" y="186" width="20" height="26" rx="3" fill="#86efac"/>
  <ellipse cx="72" cy="175" rx="14" ry="16" fill="#4ade80"/>
  <ellipse cx="60" cy="183" rx="10" ry="12" fill="#22c55e"/>
  <ellipse cx="84" cy="181" rx="10" ry="13" fill="#16a34a"/>

  <!-- Floating chart card -->
  <rect x="300" y="88" width="96" height="68" rx="10" fill="white" filter="drop-shadow(0 4px 12px rgba(88,49,224,0.18))"/>
  <rect x="308" y="96" width="50" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="308" y="106" width="36" height="4" rx="2" fill="#e2e8f0"/>
  <!-- Mini bar chart -->
  <rect x="308" y="138" width="10" height="16" rx="2" fill="#5831E0" opacity="0.4"/>
  <rect x="322" y="128" width="10" height="26" rx="2" fill="#5831E0" opacity="0.6"/>
  <rect x="336" y="120" width="10" height="34" rx="2" fill="#5831E0"/>
  <rect x="350" y="132" width="10" height="22" rx="2" fill="#7C5CFF" opacity="0.7"/>
  <rect x="364" y="125" width="10" height="29" rx="2" fill="#4F2BD0" opacity="0.8"/>
  <rect x="308" y="153" width="70" height="1" fill="#e2e8f0"/>

  <!-- Floating user card -->
  <rect x="22" y="110" width="88" height="52" rx="10" fill="white" filter="drop-shadow(0 4px 12px rgba(88,49,224,0.15))"/>
  <circle cx="42" cy="132" r="13" fill="#5831E0"/>
  <text x="42" y="137" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Inter,sans-serif">EJ</text>
  <rect x="60" y="124" width="42" height="5" rx="2" fill="#e2e8f0"/>
  <rect x="60" y="133" width="30" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="60" y="142" width="36" height="12" rx="3" fill="#5831E0"/>
  <text x="78" y="152" text-anchor="middle" fill="white" font-size="7" font-weight="600" font-family="Inter,sans-serif">Maths</text>

  <!-- Notification dot -->
  <circle cx="370" cy="78" r="10" fill="#5831E0"/>
  <text x="370" y="82" text-anchor="middle" fill="white" font-size="9" font-weight="700" font-family="Inter,sans-serif">3</text>
</svg>
